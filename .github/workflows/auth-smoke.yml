name: Auth Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  auth-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run fast auth smoke checks
        run: npm run test:auth:smoke
